<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>产品展示</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>产品展示</h1>
        <div class="filters">
            <select id="categoryFilter">
                <option value="all">所有分类</option>
            </select>
            <select id="specFilter">
                <option value="all">所有规格</option>
            </select>
            <div class="price-range">
                <label>价格区间:</label>
                <input type="number" id="minPrice" placeholder="最低" step="0.01">
                -
                <input type="number" id="maxPrice" placeholder="最高" step="0.01">
            </div>
        </div>
    </header>

    <main id="productGrid">
        <!-- 产品卡片会由JavaScript动态插入 -->
    </main>

    <script src="script.js"></script>
</body>
</html>
